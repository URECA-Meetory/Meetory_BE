<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meetory - 로그인 / 회원가입</title>
<style>
    * { box-sizing: border-box; }

    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
        background: #f4f5f7;
        margin: 0;
        padding: 40px 20px;
        color: #222;
    }

    .container {
        max-width: 400px;
        margin: 0 auto;
    }

    h1 {
        text-align: center;
        font-size: 24px;
        margin-bottom: 30px;
    }

    .card {
        background: #fff;
        border-radius: 10px;
        padding: 24px;
        margin-bottom: 20px;
        box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .card h2 {
        font-size: 16px;
        margin: 0 0 16px;
        color: #444;
    }

    input {
        width: 100%;
        padding: 10px 12px;
        margin-bottom: 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 14px;
    }

    input:focus {
        outline: none;
        border-color: #4a7dff;
    }

    button {
        width: 100%;
        padding: 11px;
        border: none;
        border-radius: 6px;
        background: #4a7dff;
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
    }

    button:hover {
        background: #3a6bef;
    }

    .message {
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 6px;
        font-size: 13px;
        display: none;
        white-space: pre-wrap;
        word-break: break-all;
    }

    .message.show {
        display: block;
    }

    .message.success {
        background: #e6f7ee;
        color: #1a7f4e;
    }

    .message.error {
        background: #fdecea;
        color: #c62828;
    }

    .switch {
        text-align: center;
        font-size: 13px;
        color: #888;
        margin-top: 10px;
    }

    .switch a {
        color: #4a7dff;
        cursor: pointer;
        text-decoration: none;
    }

    #logoutCard { display: none; }

    .token-box {
        font-size: 11px;
        color: #999;
        word-break: break-all;
        background: #f9f9f9;
        padding: 8px;
        border-radius: 6px;
        margin-bottom: 10px;
    }
</style>
</head>
<body>

<div class="container">
    <h1>Meetory</h1>

    <!-- 회원가입 카드 -->
    <div class="card" id="signupCard">
        <h2>회원가입</h2>
        <input id="signupEmail" type="email" placeholder="이메일">
        <input id="signupPassword" type="password" placeholder="비밀번호 (8~20자)">
        <input id="signupNickname" type="text" placeholder="닉네임">
        <button onclick="signup()">가입하기</button>
        <div class="message" id="signupMessage"></div>
        <div class="switch">이미 계정이 있나요? <a onclick="showLogin()">로그인</a></div>
    </div>

    <!-- 로그인 카드 -->
    <div class="card" id="loginCard" style="display:none;">
        <h2>로그인</h2>
        <input id="loginEmail" type="email" placeholder="이메일">
        <input id="loginPassword" type="password" placeholder="비밀번호">
        <button onclick="login()">로그인</button>
        <div class="message" id="loginMessage"></div>
        <div class="switch">계정이 없나요? <a onclick="showSignup()">회원가입</a></div>
    </div>

    <!-- 로그인 성공 후 로그아웃 카드 -->
    <div class="card" id="logoutCard">
        <h2>환영합니다, <span id="welcomeName"></span>님</h2>
        <div class="token-box" id="tokenBox"></div>
        <button onclick="logout()" style="background:#e05353;">로그아웃</button>
        <div class="message" id="logoutMessage"></div>
    </div>
</div>

<script>
const BASE_URL = window.location.origin;
let currentToken = null;

function showMessage(id, text, isError) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'message show ' + (isError ? 'error' : 'success');
}

function showLogin() {
    document.getElementById('signupCard').style.display = 'none';
    document.getElementById('loginCard').style.display = 'block';
}

function showSignup() {
    document.getElementById('loginCard').style.display = 'none';
    document.getElementById('signupCard').style.display = 'block';
}

async function signup() {
    const email = document.getElementById('signupEmail').value;
    const password = document.getElementById('signupPassword').value;
    const nickname = document.getElementById('signupNickname').value;

    if (!email || !password || !nickname) {
        showMessage('signupMessage', '모든 항목을 입력해주세요', true);
        return;
    }

    try {
        const res = await fetch(`${BASE_URL}/api/auth/signup`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password, nickname })
        });
        const data = await res.json();

        if (data.success) {
            showMessage('signupMessage', '회원가입 완료! 로그인해주세요.', false);
            document.getElementById('loginEmail').value = email;
            setTimeout(showLogin, 800);
        } else {
            showMessage('signupMessage', data.message, true);
        }
    } catch (e) {
        showMessage('signupMessage', '서버에 연결할 수 없습니다. 서버가 켜져 있는지 확인하세요.', true);
    }
}

async function login() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;

    if (!email || !password) {
        showMessage('loginMessage', '이메일과 비밀번호를 입력해주세요', true);
        return;
    }

    try {
        const res = await fetch(`${BASE_URL}/api/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (data.success) {
            currentToken = data.data.accessToken;
            document.getElementById('welcomeName').textContent = data.data.nickname;
            document.getElementById('tokenBox').textContent = 'token: ' + currentToken;

            document.getElementById('loginCard').style.display = 'none';
            document.getElementById('signupCard').style.display = 'none';
            document.getElementById('logoutCard').style.display = 'block';
        } else {
            showMessage('loginMessage', data.message, true);
        }
    } catch (e) {
        showMessage('loginMessage', '서버에 연결할 수 없습니다. 서버가 켜져 있는지 확인하세요.', true);
    }
}

async function logout() {
    try {
        const res = await fetch(`${BASE_URL}/api/auth/logout`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${currentToken}` }
        });
        const data = await res.json();

        if (data.success) {
            showMessage('logoutMessage', '로그아웃 되었습니다', false);
            setTimeout(() => {
                currentToken = null;
                document.getElementById('logoutCard').style.display = 'none';
                document.getElementById('loginCard').style.display = 'block';
                document.getElementById('loginPassword').value = '';
            }, 800);
        } else {
            showMessage('logoutMessage', data.message, true);
        }
    } catch (e) {
        showMessage('logoutMessage', '서버에 연결할 수 없습니다.', true);
    }
}
</script>

</body>
</html>
