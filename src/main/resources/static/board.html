<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meetory 게시판</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
	<!-- 네비게이션 바 -->
	<nav class="navbar navbar-expand-lg bg-light">
	  <div class="container">
	    <a class="navbar-brand" href="#"><b>Meetory</b></a>
	    <div class="collapse navbar-collapse">
	      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
	        <li class="nav-item"><a class="nav-link active" href="#">게시판</a></li>
	      </ul>
		  <ul class="navbar-nav">
  	        <li class="nav-item">
  	          <a class="nav-link" href="#" id="navLoginBtn" data-bs-toggle="modal" data-bs-target="#authModal">로그인 / 회원가입</a>
  	        </li>
  	      </ul>		  
	    </div>
	  </div>
	</nav>
	
	<!-- 메인 컨텐츠 -->
	<div class="container mt-4">
		<h4 class="text-center mb-4">자유 게시판</h4>
		
		<div class="d-flex justify-content-between mb-2">
            <span id="authStatus" class="text-danger fw-bold">로그인 안 됨 (토큰 없음)</span>
            <button type="button" class="btn btn-primary" id="btnInsertPage">글 쓰기</button>
        </div>
		
		<table class="table table-hover text-center">
		  <thead class="table-light">
		    <tr>
		      <th>#</th>
		      <th width="40%">제목</th>
		      <th>작성자</th>
		      <th>작성일시</th>
		    </tr>
		  </thead>
		  <tbody id="boardTbody">
            <!-- 자바스크립트로 데이터가 채워집니다 -->
		  </tbody>
		</table>
	</div>	
	
	<!-- Auth (로그인/회원가입) 모달 -->
	<div class="modal fade" id="authModal" tabindex="-1" aria-hidden="true">
	  <div class="modal-dialog">
	    <div class="modal-content">
	      <div class="modal-header">
	        <h1 class="modal-title fs-5">로그인 및 회원가입</h1>
	        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
	      </div>
	      <div class="modal-body">
            <input type="email" id="authEmail" class="form-control mb-2" placeholder="이메일">
            <input type="password" id="authPassword" class="form-control mb-2" placeholder="비밀번호 (8자 이상)">
            <input type="text" id="authNickname" class="form-control mb-3" placeholder="닉네임 (회원가입 시에만 입력)">
            <div class="d-grid gap-2">
                <button type="button" class="btn btn-success" onclick="login()">로그인</button>
                <button type="button" class="btn btn-outline-secondary" onclick="signup()">회원가입</button>
            </div>
	      </div>
	    </div>
	  </div>
	</div>

	<!-- Insert 모달 (글쓰기) -->
	<div class="modal fade" id="insertBoardModal" tabindex="-1" aria-hidden="true">
	  <div class="modal-dialog">
	    <div class="modal-content">
	      <div class="modal-header">
	        <h1 class="modal-title fs-5">새 글 작성</h1>
	        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
	      </div>
	      <div class="modal-body">
			<div class="mb-3">
			  <label for="titleInsert" class="form-label">제목</label>
			  <input type="text" class="form-control" id="titleInsert">
			</div>
			<div class="mb-3">
			  <label for="contentInsert" class="form-label">내용</label>
			  <textarea class="form-control" id="contentInsert" rows="8"></textarea>
			</div>
	      </div>
	      <div class="modal-footer">
	        <button id="btnBoardInsert" type="button" class="btn btn-primary">등록</button>
	      </div>
	    </div>
	  </div>
	</div>

    <!-- Detail 모달 (글 상세조회) -->
	<div class="modal fade" id="detailBoardModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h1 class="modal-title fs-5">글 상세 보기</h1>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <h5 id="detailTitle" class="fw-bold"></h5>
                <hr>
                <p id="detailContent" style="white-space: pre-wrap;"></p>
            </div>
          </div>
        </div>
      </div>

	<script>
		let accessToken = "";
		
		const authModal = new bootstrap.Modal(document.querySelector("#authModal"));
		const insertModal = new bootstrap.Modal(document.querySelector("#insertBoardModal"));
        const detailModal = new bootstrap.Modal(document.querySelector("#detailBoardModal"));

		window.onload = function(){
			// 글 등록 모달 창 띄우기
			document.querySelector("#btnInsertPage").onclick = function(){
                if(!accessToken) {
                    alert("로그인이 필요합니다.");
                    authModal.show();
                    return;
                }
				document.querySelector("#titleInsert").value = '';				
				document.querySelector("#contentInsert").value = '';
				insertModal.show();
			}
			
			// 글 등록 버튼 처리
			document.querySelector("#btnBoardInsert").onclick = function(){
				if(document.querySelector("#titleInsert").value == '' || document.querySelector("#contentInsert").value == ''){
					alert("제목 또는 내용을 모두 입력하세요.");
					return;
				}
				insertBoard();
			}
		}		
	
        // --- 1. 회원가입 ---
        async function signup() {
            const email = document.getElementById("authEmail").value;
            const password = document.getElementById("authPassword").value;
            const nickname = document.getElementById("authNickname").value;

            const response = await fetch("/api/auth/signup", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password, nickname })
            });
            const data = await response.json();
            if (data.success) {
                alert("회원가입 성공! 로그인을 진행해주세요.");
            } else {
                alert("가입 실패: " + (data.message || "오류"));
            }
        }

        // --- 2. 로그인 ---
        async function login() {
            const email = document.getElementById("authEmail").value;
            const password = document.getElementById("authPassword").value;

            const response = await fetch("/api/auth/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });
            const data = await response.json();
            
            if (data.success && data.data.accessToken) {
                accessToken = data.data.accessToken;
                document.getElementById("authStatus").textContent = "로그인 완료: " + data.data.nickname;
                document.getElementById("authStatus").className = "text-primary fw-bold";
                document.getElementById("navLoginBtn").textContent = "로그아웃";
                authModal.hide();
                
                // 로그인 완료 후 게시글 목록 불러오기
                listBoard();
            } else {
                alert("로그인 실패: " + (data.message || "오류"));
            }
        }

		// --- 3. 게시글 목록 조회 ---
		async function listBoard(){
			let fetchOptions = {
				method: "GET",
				headers: {
					"Authorization": `Bearer ${accessToken}`
				}
			}
			
			let response = await fetch("/api/boards", fetchOptions);
			let data = await response.json();
			
			if(data.success){			
				makeListHtml(data.data);
			} else {
				alert("글 목록 조회 중 오류가 발생했습니다.");
			}	
		}
		
		function makeListHtml(list){
			let listHtml = ``;
			
			list.forEach( el => {
                let dateObj = new Date(el.createdAt);
                let dateStr = dateObj.getFullYear() + "-" + 
                              String(dateObj.getMonth() + 1).padStart(2, '0') + "-" + 
                              String(dateObj.getDate()).padStart(2, '0');

				listHtml += `
					<tr style="cursor:pointer" onclick="showDetail(${el.id})">
						<td>${el.id}</td>
						<td class="text-start">${el.title}</td>
						<td>${el.writerNickname}</td>
						<td>${dateStr}</td>
					</tr>
				`;
			});
			
			document.querySelector("#boardTbody").innerHTML = listHtml;
		}
		
		// --- 4. 게시글 등록 ---
		async function insertBoard(){
            let payload = {
                title: document.querySelector("#titleInsert").value,
				content: document.querySelector("#contentInsert").value
            };

			let fetchOptions = {
				method: "POST",
				headers: {
					"Content-Type": "application/json",
                    "Authorization": `Bearer ${accessToken}`
				},
				body: JSON.stringify(payload)
			}
			
			let response = await fetch("/api/boards", fetchOptions);
			let data = await response.json();

			if(data.success){			
				alert("글이 등록되었습니다.");
				listBoard();
                insertModal.hide();
			} else {
				alert("글 등록 중 오류가 발생했습니다.");
			}	
		}

        // --- 5. 게시글 상세 보기 API 호출 ---
        async function showDetail(boardId) {
            try {
                let response = await fetch(`/api/boards/${boardId}`, {
                    method: "GET",
                    headers: { 
                        "Authorization": `Bearer ${accessToken}` // 👈 토큰 정상 첨부 완료!
                    }
                });
                let data = await response.json();

                if(data.success) {
                    let board = data.data;
                    document.getElementById("detailTitle").innerText = board.title;
                    document.getElementById("detailContent").innerText = board.content;
                    detailModal.show();
                } else {
                    alert("상세 조회 실패: " + data.message);
                }
            } catch (error) {
                alert("상세 조회 중 오류가 발생했습니다.");
            }
        }
	</script>	
</body>
</html>
