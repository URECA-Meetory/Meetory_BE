spring.application.name=meetory-test

spring.datasource.url=jdbc:h2:mem:meetory_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

jwt.secret=meetory-test-secret-key-must-be-at-least-32-bytes-long-for-hs256

spring.devtools.restart.enabled=false
