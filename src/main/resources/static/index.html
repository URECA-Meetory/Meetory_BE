<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetory API 테스트</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        .box { border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin-bottom: 20px; background-color: #f9f9f9; }
        h2 { margin-top: 0; font-size: 18px; color: #333; }
        input, textarea { width: 100%; padding: 8px; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        pre { background-color: #222; color: #0f0; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 13px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <h1>Meetory API 통합 테스트</h1>
    <p>현재 상태: <span id="authStatus" style="color: red; font-weight: bold;">로그인 안 됨 (토큰 없음)</span></p>

    <!-- 1. 회원가입 영역 -->
    <div class="box">
        <h2>1. 회원가입 (한 번만 하면 됩니다)</h2>
        <input type="email" id="signupEmail" placeholder="이메일 (예: test@test.com)">
        <input type="password" id="signupPassword" placeholder="비밀번호 (8자 이상)">
        <input type="text" id="signupNickname" placeholder="닉네임">
        <button onclick="signup()">회원가입 하기</button>
    </div>

    <!-- 2. 로그인 영역 -->
    <div class="box">
        <h2>2. 로그인 (토큰 발급)</h2>
        <input type="email" id="loginEmail" placeholder="가입한 이메일">
        <input type="password" id="loginPassword" placeholder="비밀번호">
        <button onclick="login()" style="background-color: #28a745;">로그인 하기</button>
    </div>

    <!-- 3. 게시글 작성 영역 -->
    <div class="box">
        <h2>3. 게시글 작성 (로그인 후 가능)</h2>
        <input type="text" id="boardTitle" placeholder="게시글 제목">
        <textarea id="boardContent" rows="4" placeholder="게시글 내용"></textarea>
        <button onclick="createBoard()" style="background-color: #ffc107; color: black;">게시글 작성하기</button>
    </div>

    <!-- 결과 출력 영역 -->
    <div class="box">
        <h2>API 응답 결과</h2>
        <pre id="responseOutput">결과가 여기에 표시됩니다...</pre>
    </div>

    <script>
        // 발급받은 JWT 토큰을 저장할 변수
        let accessToken = "";

        // 결과를 화면에 출력하는 함수
        function printResult(data) {
            document.getElementById("responseOutput").textContent = JSON.stringify(data, null, 2);
        }

        // 1. 회원가입 API 호출
        async function signup() {
            const email = document.getElementById("signupEmail").value;
            const password = document.getElementById("signupPassword").value;
            const nickname = document.getElementById("signupNickname").value;

            try {
                const response = await fetch("/api/auth/signup", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password, nickname })
                });
                const data = await response.json();
                printResult(data);
                if (data.success) alert("회원가입 성공! 이제 로그인을 진행해 주세요.");
            } catch (error) {
                printResult({ error: error.message });
            }
        }

        // 2. 로그인 API 호출
        async function login() {
            const email = document.getElementById("loginEmail").value;
            const password = document.getElementById("loginPassword").value;

            try {
                const response = await fetch("/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                printResult(data);

                // 로그인 성공 시 토큰 저장 및 상태 업데이트
                if (data.success && data.data.accessToken) {
                    accessToken = data.data.accessToken;
                    document.getElementById("authStatus").textContent = "로그인 완료 (토큰 발급됨)";
                    document.getElementById("authStatus").style.color = "blue";
                    alert(`로그인 성공! 환영합니다, ${data.data.nickname}님.`);
                }
            } catch (error) {
                printResult({ error: error.message });
            }
        }

        // 3. 게시글 작성 API 호출
        async function createBoard() {
            if (!accessToken) {
                alert("먼저 로그인을 진행해서 토큰을 발급받아야 합니다!");
                return;
            }

            const title = document.getElementById("boardTitle").value;
            const content = document.getElementById("boardContent").value;

            try {
                const response = await fetch("/api/boards", {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        // API 요청 헤더에 JWT 토큰을 담아서 보냄
                        "Authorization": `Bearer ${accessToken}` 
                    },
                    body: JSON.stringify({ title, content })
                });
                const data = await response.json();
                printResult(data);
                
                if (response.status === 201 || data.success) {
                    alert("게시글이 성공적으로 작성되었습니다!");
                } else if (response.status === 401) {
                    alert("401 에러: 인증에 실패했습니다. (SecurityConfig 설정 확인 필요)");
                }
            } catch (error) {
                printResult({ error: error.message });
            }
        }
    </script>
</body>
</html>
